name: Android Release APK (arm64)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --runInBand

      - name: Build arm64 release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a

      - name: Show output sizes
        run: |
          cd android
          find app/build/outputs/apk -type f -name '*.apk' -exec ls -lh {} \;

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hebarcode-reader-release-arm64-apk
          path: android/app/build/outputs/apk/release/*arm64-v8a*.apk
          if-no-files-found: error
