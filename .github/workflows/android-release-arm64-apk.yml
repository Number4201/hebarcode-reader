name: Android Release APK (arm64)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Audit dependencies
        run: npm audit --package-lock-only

      - name: Run tests
        run: npm test -- --ci --runInBand

      - name: Validate signing secrets
        env:
          HEBARCODE_RELEASE_KEYSTORE_BASE64: ${{ secrets.HEBARCODE_RELEASE_KEYSTORE_BASE64 }}
          HEBARCODE_RELEASE_STORE_PASSWORD: ${{ secrets.HEBARCODE_RELEASE_STORE_PASSWORD }}
          HEBARCODE_RELEASE_KEY_ALIAS: ${{ secrets.HEBARCODE_RELEASE_KEY_ALIAS }}
          HEBARCODE_RELEASE_KEY_PASSWORD: ${{ secrets.HEBARCODE_RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$HEBARCODE_RELEASE_KEYSTORE_BASE64"
          test -n "$HEBARCODE_RELEASE_STORE_PASSWORD"
          test -n "$HEBARCODE_RELEASE_KEY_ALIAS"
          test -n "$HEBARCODE_RELEASE_KEY_PASSWORD"

      - name: Prepare release keystore
        env:
          HEBARCODE_RELEASE_KEYSTORE_BASE64: ${{ secrets.HEBARCODE_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$HEBARCODE_RELEASE_KEYSTORE_BASE64"
          echo "$HEBARCODE_RELEASE_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build arm64 release APK
        env:
          HEBARCODE_RELEASE_STORE_FILE: release.keystore
          HEBARCODE_RELEASE_STORE_PASSWORD: ${{ secrets.HEBARCODE_RELEASE_STORE_PASSWORD }}
          HEBARCODE_RELEASE_KEY_ALIAS: ${{ secrets.HEBARCODE_RELEASE_KEY_ALIAS }}
          HEBARCODE_RELEASE_KEY_PASSWORD: ${{ secrets.HEBARCODE_RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:createBundleReleaseJsAndAssets :app:assembleRelease -PreactNativeArchitectures=arm64-v8a

      - name: Verify bundled JS exists inside APK
        run: |
          cd android
          APK_PATH=$(find app/build/outputs/apk/release -type f -name '*arm64-v8a*.apk' | head -n 1)
          test -n "$APK_PATH"
          unzip -l "$APK_PATH" | grep 'assets/index.android.bundle'

      - name: Show output sizes
        run: |
          cd android
          find app/build/outputs/apk -type f -name '*.apk' -exec ls -lh {} \;

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: hebarcode-reader-release-arm64-apk
          path: android/app/build/outputs/apk/release/*arm64-v8a*.apk
          if-no-files-found: error
